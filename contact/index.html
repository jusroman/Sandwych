<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – SandwYch</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <!--#include virtual="/shared/header.html" -->

  <main class="page page-contact">
    <section class="hero hero-secondary">
      <h1>Contact Us</h1>
      <p>If you would like to speak with a SandwYch team member, please fill out the form below.</p>
    </section>

    <section class="section">
      <form class="contact-form">
        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required>
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="form-row">
          <label for="role">I am a...</label>
          <select id="role" name="role">
            <option value="">Select</option>
            <option value="patient">Patient / Care Partner</option>
            <option value="provider">Provider</option>
            <option value="cso">Care Service Organization</option>
            <option value="health-plan">Health Plan</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </section>
  </main>

  <!--#include virtual="/shared/footer.html" -->
</body>
</html>
